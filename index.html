<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mac's Test Page</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      padding: 40px 32px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.15;
    }

    p {
      margin: 0 0 26px;
      font-size: 1.05rem;
      color: #4b5563;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 10px;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome to Mac's Test Page!</h1>
    <p>Glad you're here. This is a simple landing page with a clean design.</p>
    <a class="btn" href="mailto:mac@example.com">Contact Mac</a>
  </main>
</body>
</html>
